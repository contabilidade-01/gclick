<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>{{ titulo }} — {{ competencia }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: #eef2f7; color: #1f2937; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            width: 100%; max-width: 440px; overflow: hidden; }
    .top { background: #1e3a5f; color: #fff; padding: 22px 24px; text-align: center; }
    .top .marca { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.85; }
    .top .doc { font-size: 20px; font-weight: 600; margin-top: 8px; }
    .body { padding: 24px; }
    .linha { display: flex; justify-content: space-between; padding: 10px 0;
             border-bottom: 1px solid #f0f2f5; font-size: 15px; }
    .linha:last-of-type { border-bottom: 0; }
    .linha .rot { color: #6b7280; }
    .linha .val { font-weight: 600; }
    .btn { display: block; width: 100%; margin-top: 22px; padding: 16px;
           background: #22c55e; color: #fff; border: 0; border-radius: 10px;
           font-size: 17px; font-weight: 600; text-align: center; text-decoration: none;
           cursor: pointer; }
    .btn:active { background: #16a34a; }
    .rodape { padding: 16px 24px; text-align: center; color: #9ca3af; font-size: 12px;
              background: #fafbfc; border-top: 1px solid #f0f2f5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="marca">📄 NESCON Contabilidade</div>
      <div class="doc">{{ titulo }}</div>
    </div>
    <div class="body">
      <div class="linha"><span class="rot">Competência</span><span class="val">{{ competencia }}</span></div>
      {% if vencimento %}
      <div class="linha"><span class="rot">Vencimento</span><span class="val">🗓 {{ vencimento }}</span></div>
      {% endif %}

      <a class="btn" href="/g/{{ token }}/ver" target="_blank" rel="noopener">
        📄 Visualizar / Baixar documento
      </a>
    </div>
    <div class="rodape">
      Documento disponibilizado por <strong>NESCON Contabilidade</strong>.<br>
      Em caso de dúvidas, fale com o seu contato no escritório.
    </div>
  </div>
</body>
</html>
